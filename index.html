<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summify — AI Text Summarizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff5d7;
            --surface: #ffffff;
            --surface2: #fff0c4;
            --border: rgba(255,94,108,0.15);
            --border-bright: rgba(255,94,108,0.4);
            --accent: #feb300;
            --coral: #ff5e6c;
            --pink: #ffaaab;
            --text: #2a1a0e;
            --muted: #a08060;
            --error: #ff5e6c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,94,108,0.08) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 600px; height: 600px;
            background: rgba(255,170,171,0.35);
            top: -200px; right: -150px;
            animation: drift 14s ease-in-out infinite alternate;
        }
        .blob-2 {
            width: 450px; height: 450px;
            background: rgba(254,179,0,0.2);
            bottom: -150px; left: -100px;
            animation: drift 18s ease-in-out infinite alternate-reverse;
        }
        .blob-3 {
            width: 300px; height: 300px;
            background: rgba(255,94,108,0.1);
            top: 50%; left: 50%;
            animation: drift 10s ease-in-out infinite alternate;
        }

        @keyframes drift {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 40px); }
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 48px 24px 72px;
        }

        header {
            margin-bottom: 60px;
            animation: fadeUp 0.6s ease both;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,94,108,0.1);
            border: 1.5px solid rgba(255,94,108,0.25);
            color: var(--coral);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.12em;
            padding: 6px 16px;
            border-radius: 100px;
            margin-bottom: 24px;
        }

        .badge::before {
            content: '';
            width: 7px; height: 7px;
            background: var(--coral);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(38px, 6vw, 62px);
            font-weight: 400;
            line-height: 1.05;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        h1 em {
            font-style: italic;
            color: var(--coral);
        }

        .subtitle {
            margin-top: 18px;
            color: var(--muted);
            font-size: 17px;
            font-weight: 400;
            max-width: 480px;
            line-height: 1.6;
        }

        .card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 36px;
            animation: fadeUp 0.6s ease 0.1s both;
            transition: border-color 0.3s;
            box-shadow: 0 8px 40px rgba(255,94,108,0.06);
        }

        .card:focus-within {
            border-color: var(--border-bright);
            box-shadow: 0 8px 48px rgba(255,94,108,0.12);
        }

        .card-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .card-label span {
            font-size: 11px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .char-pill {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 100px;
            border: 1.5px solid var(--border);
            color: var(--muted);
            background: var(--bg);
            transition: all 0.3s;
        }

        .char-pill.warn { border-color: rgba(255,94,108,0.4); color: var(--coral); background: rgba(255,94,108,0.06); }
        .char-pill.ok { border-color: rgba(254,179,0,0.5); color: #8a6000; background: rgba(254,179,0,0.1); }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            line-height: 1.9;
            min-height: 260px;
            caret-color: var(--coral);
        }

        textarea::placeholder { color: #d4c0a0; }

        .divider {
            height: 1.5px;
            background: var(--border);
            margin: 24px 0;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-sample {
            background: var(--bg);
            border: 1.5px solid var(--border);
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.03em;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-sample:hover {
            border-color: var(--accent);
            color: #8a6000;
            background: rgba(254,179,0,0.08);
        }

        .btn-clear {
            background: none;
            border: none;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 12px 10px;
            transition: color 0.2s;
        }
        .btn-clear:hover { color: var(--coral); }

        .btn-summarize {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--coral);
            color: #fff;
            border: none;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.03em;
            padding: 14px 32px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(255,94,108,0.3);
        }

        .btn-summarize:hover:not(:disabled) {
            background: #ff3d4e;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(255,94,108,0.4);
        }

        .btn-summarize:active:not(:disabled) { transform: translateY(0); }
        .btn-summarize:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-icon { font-size: 16px; transition: transform 0.3s; }
        .btn-summarize:hover:not(:disabled) .btn-icon { transform: rotate(20deg); }

        .loading-bar {
            display: none;
            height: 3px;
            background: rgba(255,94,108,0.15);
            border-radius: 3px;
            margin-top: 24px;
            overflow: hidden;
        }
        .loading-bar.active { display: block; }
        .loading-bar::after {
            content: '';
            display: block;
            height: 100%;
            width: 35%;
            background: linear-gradient(90deg, transparent, var(--coral), var(--accent), transparent);
            animation: slide 1.3s ease-in-out infinite;
        }
        @keyframes slide {
            0% { transform: translateX(-200%); }
            100% { transform: translateX(500%); }
        }

        .loading-text {
            display: none;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.1em;
            margin-top: 12px;
            text-align: center;
        }
        .loading-text.active { display: block; }

        .result-card {
            margin-top: 24px;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            display: none;
            box-shadow: 0 8px 40px rgba(255,94,108,0.07);
        }
        .result-card.active {
            display: block;
            animation: fadeUp 0.5s ease both;
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 2px solid var(--border);
            background: rgba(255,170,171,0.08);
        }

        .result-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
        }

        .result-dot {
            width: 9px; height: 9px;
            background: var(--coral);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,94,108,0.6);
        }

        .btn-copy {
            background: none;
            border: 1.5px solid var(--border);
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.08em;
            padding: 7px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-copy:hover { border-color: var(--coral); color: var(--coral); }
        .btn-copy.copied { border-color: var(--accent); color: #8a6000; }

        .result-body { padding: 32px; }

        .result-text {
            font-family: 'Instrument Serif', serif;
            font-size: 22px;
            line-height: 1.75;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .result-stats {
            display: flex;
            margin-top: 28px;
            border-top: 2px solid var(--border);
            padding-top: 24px;
        }

        .stat { flex: 1; text-align: center; }
        .stat + .stat { border-left: 2px solid var(--border); }

        .stat-value {
            font-family: 'Instrument Serif', serif;
            font-size: 32px;
            color: var(--text);
            display: block;
        }

        .stat-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.12em;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 4px;
            display: block;
        }

        .reduction-value { color: var(--coral); }

        .error-card {
            display: none;
            margin-top: 16px;
            padding: 18px 24px;
            background: rgba(255,94,108,0.06);
            border: 1.5px solid rgba(255,94,108,0.25);
            border-radius: 14px;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            color: var(--coral);
            letter-spacing: 0.02em;
        }
        .error-card.active { display: block; animation: fadeUp 0.3s ease both; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: 56px;
            text-align: center;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: var(--pink);
            letter-spacing: 0.1em;
            animation: fadeUp 0.6s ease 0.3s both;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="wrapper">
        <header>
            <div class="badge">✦ AI POWERED · LSA MODEL</div>
            <h1>Turn walls of text<br>into <em>clear insight</em></h1>
            <p class="subtitle">Paste any long-form text and get a concise, intelligent summary in seconds.</p>
        </header>

        <div class="card">
            <div class="card-label">
                <span>Input Text</span>
                <span class="char-pill" id="charPill">0 chars</span>
            </div>
            <textarea id="inputText" rows="12" placeholder="Paste your article, essay, or document here..."></textarea>
            <div class="divider"></div>
            <div class="actions">
                <button class="btn-sample" onclick="loadSample()">Load sample</button>
                <button class="btn-clear" onclick="clearText()">Clear</button>
                <button class="btn-summarize" id="summarizeBtn" onclick="summarize()">
                    <span class="btn-icon">✦</span> Summarize
                </button>
            </div>
        </div>

        <div class="loading-bar" id="loadingBar"></div>
        <div class="loading-text" id="loadingText">GENERATING SUMMARY...</div>
        <div class="error-card" id="errorCard"></div>

        <div class="result-card" id="resultCard">
            <div class="result-header">
                <div class="result-title">
                    <div class="result-dot"></div>
                    Summary
                </div>
                <button class="btn-copy" id="copyBtn" onclick="copySummary()">COPY</button>
            </div>
            <div class="result-body">
                <div class="result-text" id="resultText"></div>
                <div class="result-stats">
                    <div class="stat">
                        <span class="stat-value" id="statOriginal">—</span>
                        <span class="stat-label">Original</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="statSummary">—</span>
                        <span class="stat-label">Summary</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value reduction-value" id="statReduction">—</span>
                        <span class="stat-label">Reduced</span>
                    </div>
                </div>
            </div>
        </div>

        <footer>SUMMIFY · CRAFTED BY SYED FASIHUDDIN</footer>
    </div>

    <script>
        const API_URL = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
            ? 'http://127.0.0.1:8000'
            : `${window.location.protocol}//${window.location.hostname}:8000`;

        const inputText = document.getElementById('inputText');
        const charPill = document.getElementById('charPill');
        const summarizeBtn = document.getElementById('summarizeBtn');
        const loadingBar = document.getElementById('loadingBar');
        const loadingText = document.getElementById('loadingText');
        const errorCard = document.getElementById('errorCard');
        const resultCard = document.getElementById('resultCard');
        const resultText = document.getElementById('resultText');
        const copyBtn = document.getElementById('copyBtn');

        inputText.addEventListener('input', () => {
            const len = inputText.value.length;
            charPill.textContent = `${len} chars`;
            charPill.className = 'char-pill' + (len === 0 ? '' : len < 100 ? ' warn' : ' ok');
        });

        function clearText() {
            inputText.value = '';
            inputText.dispatchEvent(new Event('input'));
            resultCard.classList.remove('active');
            errorCard.classList.remove('active');
        }

        function loadSample() {
            inputText.value = `Artificial intelligence (AI) has become one of the most transformative technologies of the 21st century, revolutionizing industries from healthcare to finance, transportation to entertainment. At its core, AI refers to the simulation of human intelligence in machines that are programmed to think, learn, and problem-solve like humans. The field encompasses various subdomains including machine learning, natural language processing, computer vision, and robotics. Machine learning, a subset of AI, enables systems to learn and improve from experience without being explicitly programmed. Deep learning, a further specialization within machine learning, uses neural networks with multiple layers to analyze various factors of data. These technologies have led to breakthrough applications such as voice assistants like Siri and Alexa, recommendation systems used by Netflix and Amazon, autonomous vehicles being developed by companies like Tesla and Waymo, and medical diagnosis systems that can detect diseases from medical imaging with accuracy rivaling human experts. The impact of AI extends beyond commercial applications into scientific research, where it accelerates drug discovery, helps in climate modeling, and assists astronomers in discovering new celestial objects. However, the rapid advancement of AI also raises important ethical questions about privacy, job displacement, algorithmic bias, and the need for regulation. As AI systems become more sophisticated and autonomous, society must grapple with questions about transparency, accountability, and the appropriate boundaries of AI decision-making. Despite these challenges, the potential benefits of AI are immense, promising to solve complex problems, enhance human capabilities, and create new opportunities for innovation and growth across virtually every sector of the economy.`;
            inputText.dispatchEvent(new Event('input'));
        }

        async function summarize() {
            const text = inputText.value.trim();
            errorCard.classList.remove('active');
            resultCard.classList.remove('active');

            if (!text) return showError('Please enter some text.');
            if (text.length < 100) return showError('Need at least 100 characters.');

            loadingBar.classList.add('active');
            loadingText.classList.add('active');
            summarizeBtn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/summarize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Failed to summarize.');

                resultText.textContent = data.summary;
                document.getElementById('statOriginal').textContent = `${data.original_length.toLocaleString()} ch`;
                document.getElementById('statSummary').textContent = `${data.summary_length.toLocaleString()} ch`;
                document.getElementById('statReduction').textContent = `${((1 - data.summary_length / data.original_length) * 100).toFixed(0)}%`;
                resultCard.classList.add('active');

            } catch (e) {
                showError(e.message || 'Could not connect to backend. Is the server running?');
            } finally {
                loadingBar.classList.remove('active');
                loadingText.classList.remove('active');
                summarizeBtn.disabled = false;
            }
        }

        function showError(msg) {
            errorCard.textContent = '⚠ ' + msg;
            errorCard.classList.add('active');
        }

        async function copySummary() {
            await navigator.clipboard.writeText(resultText.textContent);
            copyBtn.textContent = 'COPIED ✓';
            copyBtn.classList.add('copied');
            setTimeout(() => { copyBtn.textContent = 'COPY'; copyBtn.classList.remove('copied'); }, 2000);
        }

        inputText.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') summarize();
        });
    </script>
</body>
</html>
